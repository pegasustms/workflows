name: Build & Push (Reusable)

# Estagio 1 de 4 da pipeline. Roda testes e publica a imagem no ECR.
# Expoe version/image como outputs pro caller encadear deploy-vps/deploy-aws/release.

on:
  workflow_call:
    inputs:
      service-name:
        description: 'Nome do servico (ex: conhecimento-service). ECR = pegasus/<service-name>.'
        required: true
        type: string
      java-version:
        required: false
        type: string
        default: '25'
      maven-server-id:
        description: 'server-id do settings.xml para o GitHub Packages.'
        required: false
        type: string
        default: 'github'
    secrets:
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      PACKAGES_TOKEN:
        required: false
    outputs:
      version:
        description: 'Tag/versao gerada (<data>-<sha>-<env>).'
        value: ${{ jobs.build-push.outputs.version }}
      image:
        description: 'URI completa da imagem no ECR.'
        value: ${{ jobs.build-push.outputs.image }}

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ENVIRONMENT: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
  ECR_REPOSITORY: pegasus/${{ inputs.service-name }}

jobs:
  build-test:
    name: Build & Test (Maven)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}
          cache: maven
          server-id: ${{ inputs.maven-server-id }}
          server-username: MAVEN_ACTOR
          server-password: MAVEN_TOKEN
      - name: Build e testes
        env:
          MAVEN_ACTOR: ${{ github.actor }}
          MAVEN_TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        # exclui testes @Tag("integration") (sobem contexto/infra); rodar IT separado com infra
        run: mvn -B clean verify -DexcludedGroups=integration

  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: build-test
    environment: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
    permissions:
      contents: read
      packages: read
    outputs:
      version: ${{ steps.version.outputs.value }}
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v7
      - name: Generate Version
        id: version
        run: |
          TZ="America/Sao_Paulo"
          DATE=$(TZ=$TZ date +'%Y%m%d')
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "value=${DATE}-${SHORT_SHA}-${ENVIRONMENT}" >> "$GITHUB_OUTPUT"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Cache Docker layers
        uses: actions/cache@v6
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ inputs.service-name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ inputs.service-name }}-
      - name: Build, tag, and push image to ECR
        id: build
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.version.outputs.value }}
          GH_TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker buildx build --platform linux/amd64 \
            --build-arg GITHUB_ACTOR=${{ github.actor }} \
            --secret id=gh_token,env=GH_TOKEN \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            -t "$IMAGE" \
            -t "$REGISTRY/$ECR_REPOSITORY:latest" \
            --push \
            .
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

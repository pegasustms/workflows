name: Build and Push Docker Image to GCP (Reusable)

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
        description: 'Nome do serviço (ex: *-service)'
      artifact_registry_repository:
        required: true
        type: string
        description: 'Nome do repositório Artifact Registry (ex: pegasus-dev)'
    secrets:
      GCP_PROJECT_ID:
        required: true
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: true
      GCP_SERVICE_ACCOUNT:
        required: true
      WORKFLOW_TOKEN:
        required: true

jobs:
  build-and-push:
    name: Build & Push ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
    
    permissions:
      contents: read
      id-token: write
      packages: read

    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: us-east4
      ARTIFACT_REGISTRY_LOCATION: us-east4
      ARTIFACT_REGISTRY_REPOSITORY: ${{ inputs.artifact_registry_repository }}
      CLOUD_RUN_SERVICE: ${{ inputs.service_name }}
      ENVIRONMENT: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate version
        id: version
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          VERSION="${TIMESTAMP}-${SHORT_SHA}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Generated version: $VERSION"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build, tag, and push image to Artifact Registry
        env:
          IMAGE_TAG: ${{ env.VERSION }}
          REGISTRY: ${{ env.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPOSITORY }}
        run: |
          docker buildx build --platform linux/amd64 \
            --build-arg GITHUB_ACTOR=${{ github.actor }} \
            --build-arg GITHUB_TOKEN=${{ secrets.WORKFLOW_TOKEN || secrets.GITHUB_TOKEN }} \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            -t $REGISTRY/${{ inputs.service_name }}:$IMAGE_TAG \
            -t $REGISTRY/${{ inputs.service_name }}:latest \
            --push \
            .
          
          # Move cache to avoid growing cache size indefinitely
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Image pushed successfully
        run: |
          echo "✅ Image pushed successfully!"
          echo "Service: ${{ inputs.service_name }}"
          echo "Version: $VERSION"
          echo "Image: ${{ env.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPOSITORY }}/${{ inputs.service_name }}:$VERSION"
          echo "Latest: ${{ env.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPOSITORY }}/${{ inputs.service_name }}:latest"

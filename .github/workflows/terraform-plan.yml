name: Terraform Plan (Reusable)

# Roda `make plan ENV=<env>` em PRs do repo terraform e comenta o output no PR.
# Detecta drift e mostra impactos antes do merge.
# Apply só roda em main (workflow terraform-apply.yml).

on:
  workflow_call:
    inputs:
      environment_name:
        required: false
        type: string
        default: 'dev'
        description: 'Ambiente alvo: dev, stg, ou prod.'
      working_directory:
        required: false
        type: string
        default: '.'
        description: 'Diretório do terraform (default raiz do repo).'
      terraform_version:
        required: false
        type: string
        default: '1.10.0'
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      # Variáveis sensíveis injetadas como TF_VAR_*
      TF_VARS_TFVARS:
        required: true
        description: 'Conteúdo completo do terraform.tfvars (multi-linha, com todos os secrets). Use github secret.'

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Plan ${{ inputs.environment_name }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ENV: ${{ inputs.environment_name }}

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write terraform.tfvars from secret
        run: |
          cat > terraform.tfvars <<'TFEOF'
          ${{ secrets.TF_VARS_TFVARS }}
          TFEOF
          echo "terraform.tfvars escrito (linhas: $(wc -l < terraform.tfvars))"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Terraform init
        run: make init ENV=$ENV

      - name: Terraform fmt check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: |
          set +e
          make plan ENV=$ENV 2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Sanitize plan for PR comment
        if: github.event_name == 'pull_request'
        run: |
          # Remove valores sensíveis óbvios + corta para caber no PR comment (max 65k chars)
          head -c 60000 plan_output.txt | \
            sed 's/AKIA[0-9A-Z]\{16\}/REDACTED-AWS-KEY/g' \
              > plan_sanitized.txt

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ inputs.working_directory }}/plan_sanitized.txt', 'utf8');
            const body = [
              `### Terraform Plan — \`${{ inputs.environment_name }}\``,
              '',
              `exit code: ${{ steps.plan.outputs.exitcode }}`,
              '',
              '<details><summary>Click to expand plan output</summary>',
              '',
              '```hcl',
              plan,
              '```',
              '</details>'
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode != '0' && steps.plan.outputs.exitcode != '2'
        run: |
          echo "Terraform plan retornou exit code ${{ steps.plan.outputs.exitcode }} (esperado 0 = sem mudanças ou 2 = mudanças)"
          exit 1

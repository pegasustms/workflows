name: Deploy Service to GCP (Reusable)

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
        description: 'Nome do serviço (ex: conhecimento-service)'
      artifact_registry_repository:
        required: true
        type: string
        description: 'Nome do repositório Artifact Registry (ex: pegasus-dev)'
      expose_port:
        required: false
        type: string
        default: '8080'
        description: 'Porta exposta pelo serviço'
      database_name:
        required: false
        type: string
        default: ''
        description: 'Nome do banco de dados (vazio se não usa DB)'
      db_password_secret_name:
        required: false
        type: string
        default: 'pegasus-dev-db-password'
        description: 'Nome do secret no Secret Manager para a senha do banco'
      cpu:
        required: false
        type: string
        default: '1'
        description: 'CPU allocation'
      memory:
        required: false
        type: string
        default: '1024Mi'
        description: 'Memory allocation'
      ingress:
        required: false
        type: string
        default: 'internal'
        description: 'Cloud Run ingress setting (internal or all)'
      use_rabbitmq:
        required: false
        type: boolean
        default: true
        description: 'Se o serviço usa RabbitMQ'
      mongodb_database:
        required: false
        type: string
        default: ''
        description: 'Nome do banco MongoDB (ex: averbacao_service, emissor_service, relatorio_service). Vazio se não usa MongoDB'
      use_storage:
        required: false
        type: boolean
        default: false
        description: 'Se o serviço usa Cloud Storage'
      use_clerk:
        required: false
        type: boolean
        default: false
        description: 'Se o serviço usa Clerk (monta secrets clerk-secret-key e clerk-webhook-signing-secret)'
      use_clerk_jwt:
        required: false
        type: boolean
        default: false
        description: 'Se o serviço usa Clerk JWT public key (monta secret clerk-jwt-public-key)'
      extra_env_vars:
        required: false
        type: string
        default: ''
        description: 'Env vars extras no formato KEY=VALUE,KEY2=VALUE2'
    secrets:
      GCP_PROJECT_ID:
        required: true
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: true
      GCP_SERVICE_ACCOUNT:
        required: true
      WORKFLOW_TOKEN:
        required: true

jobs:
  build-and-deploy:
    name: Build & Deploy ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}

    permissions:
      contents: read
      id-token: write
      packages: read

    env:
      GCP_REGION: ${{ vars.GCP_REGION || 'us-east4' }}
      ARTIFACT_REGISTRY_LOCATION: ${{ vars.GCP_REGION || 'us-east4' }}
      ARTIFACT_REGISTRY_REPOSITORY: ${{ inputs.artifact_registry_repository }}
      CLOUD_RUN_SERVICE: ${{ inputs.service_name }}
      ENVIRONMENT: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Generate Version
        run: |
          TZ="America/Sao_Paulo"
          DATE=$(TZ=$TZ date +'%Y%m%d')
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "VERSION=${DATE}-${SHORT_SHA}-${ENVIRONMENT}" >> $GITHUB_ENV

      - name: Display Version
        run: |
          echo "Build Version: $VERSION"
          echo "Service: ${{ inputs.service_name }}"
          echo "Environment: $ENVIRONMENT"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build, tag, and push image to Artifact Registry
        env:
          IMAGE_TAG: ${{ env.VERSION }}
          REGISTRY: ${{ env.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPOSITORY }}
        run: |
          docker buildx build --platform linux/amd64 \
            --build-arg GITHUB_ACTOR=${{ github.actor }} \
            --build-arg GITHUB_TOKEN=${{ secrets.WORKFLOW_TOKEN || secrets.GITHUB_TOKEN }} \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            -t $REGISTRY/${{ inputs.service_name }}:$IMAGE_TAG \
            -t $REGISTRY/${{ inputs.service_name }}:latest \
            --push \
            .

          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Ensure Service Account and IAM permissions
        run: |
          SA_NAME="${{ inputs.service_name }}-sa"
          SA_EMAIL="${SA_NAME}@${GCP_PROJECT_ID}.iam.gserviceaccount.com"

          # Create SA if it doesn't exist
          if ! gcloud iam service-accounts describe "$SA_EMAIL" --project=$GCP_PROJECT_ID &>/dev/null; then
            gcloud iam service-accounts create "$SA_NAME" \
              --display-name="Service Account for ${{ inputs.service_name }}" \
              --project=$GCP_PROJECT_ID
            echo "Created service account: $SA_EMAIL"
          fi

          # Database: secret accessor for db-password + Cloud SQL client
          if [ -n "${{ inputs.database_name }}" ]; then
            gcloud secrets add-iam-policy-binding ${{ inputs.db_password_secret_name }} \
              --member="serviceAccount:$SA_EMAIL" \
              --role="roles/secretmanager.secretAccessor" \
              --project=$GCP_PROJECT_ID --quiet 2>/dev/null || true

            gcloud projects add-iam-policy-binding $GCP_PROJECT_ID \
              --member="serviceAccount:$SA_EMAIL" \
              --role="roles/cloudsql.client" --quiet 2>/dev/null || true
          fi

          # Clerk secrets
          if [ "${{ inputs.use_clerk }}" = "true" ]; then
            for SECRET in clerk-secret-key clerk-webhook-signing-secret; do
              gcloud secrets add-iam-policy-binding $SECRET \
                --member="serviceAccount:$SA_EMAIL" \
                --role="roles/secretmanager.secretAccessor" \
                --project=$GCP_PROJECT_ID --quiet 2>/dev/null || true
            done
          fi

          # Clerk JWT public key
          if [ "${{ inputs.use_clerk_jwt }}" = "true" ]; then
            gcloud secrets add-iam-policy-binding clerk-jwt-public-key \
              --member="serviceAccount:$SA_EMAIL" \
              --role="roles/secretmanager.secretAccessor" \
              --project=$GCP_PROJECT_ID --quiet 2>/dev/null || true
          fi

          # Storage
          if [ "${{ inputs.use_storage }}" = "true" ]; then
            gcloud projects add-iam-policy-binding $GCP_PROJECT_ID \
              --member="serviceAccount:$SA_EMAIL" \
              --role="roles/storage.objectAdmin" --quiet 2>/dev/null || true
          fi

      - name: Deploy to Cloud Run
        env:
          IMAGE_TAG: ${{ env.VERSION }}
          REGISTRY: ${{ env.ARTIFACT_REGISTRY_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPOSITORY }}
        run: |
          IMAGE_URI="$REGISTRY/${{ inputs.service_name }}:$IMAGE_TAG"

          # --- Read secrets from Secret Manager ---
          DB_HOST=$(gcloud secrets versions access latest --secret=db-host --project=$GCP_PROJECT_ID 2>/dev/null || echo "")
          DB_USER=$(gcloud secrets versions access latest --secret=db-user --project=$GCP_PROJECT_ID 2>/dev/null || echo "")
          DB_PASSWORD_SECRET="projects/$GCP_PROJECT_ID/secrets/db-password/versions/latest"
          REDIS_HOST=$(gcloud secrets versions access latest --secret=redis-host --project=$GCP_PROJECT_ID 2>/dev/null || echo "")
          DATADOG_AGENT_URL=$(gcloud secrets versions access latest --secret=datadog-agent-url --project=$GCP_PROJECT_ID 2>/dev/null || echo "")

          # --- Build env vars ---
          ENV_VARS="SPRING_PROFILES_ACTIVE=$ENVIRONMENT,gcp"
          ENV_VARS="$ENV_VARS;;ENVIRONMENT=$ENVIRONMENT"
          ENV_VARS="$ENV_VARS;;SERVER_PORT=${{ inputs.expose_port }}"
          ENV_VARS="$ENV_VARS;;APP_VERSION=$VERSION"
          ENV_VARS="$ENV_VARS;;GIT_COMMIT_SHA=${{ github.sha }}"

          # Database
          if [ -n "${{ inputs.database_name }}" ]; then
            ENV_VARS="$ENV_VARS;;SPRING_DATASOURCE_URL=jdbc:postgresql://${DB_HOST}:5432/${{ inputs.database_name }}?prepareThreshold=0"
            ENV_VARS="$ENV_VARS;;SPRING_DATASOURCE_USERNAME=${DB_USER}"
            ENV_VARS="$ENV_VARS;;SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=5"
          fi

          # Redis
          ENV_VARS="$ENV_VARS;;SPRING_DATA_REDIS_HOST=${REDIS_HOST}"
          ENV_VARS="$ENV_VARS;;SPRING_DATA_REDIS_PORT=6379"

          # RabbitMQ (from secrets)
          if [ "${{ inputs.use_rabbitmq }}" = "true" ]; then
            RABBITMQ_HOST=$(gcloud secrets versions access latest --secret=rabbitmq-host --project=$GCP_PROJECT_ID)
            RABBITMQ_USERNAME=$(gcloud secrets versions access latest --secret=rabbitmq-username --project=$GCP_PROJECT_ID)
            RABBITMQ_PASSWORD=$(gcloud secrets versions access latest --secret=rabbitmq-password --project=$GCP_PROJECT_ID)
            RABBITMQ_VHOST=$(gcloud secrets versions access latest --secret=rabbitmq-vhost --project=$GCP_PROJECT_ID)
            ENV_VARS="$ENV_VARS;;SPRING_RABBITMQ_HOST=${RABBITMQ_HOST}"
            ENV_VARS="$ENV_VARS;;SPRING_RABBITMQ_PORT=5671"
            ENV_VARS="$ENV_VARS;;SPRING_RABBITMQ_USERNAME=${RABBITMQ_USERNAME}"
            ENV_VARS="$ENV_VARS;;SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}"
            ENV_VARS="$ENV_VARS;;SPRING_RABBITMQ_VIRTUAL_HOST=${RABBITMQ_VHOST}"
            ENV_VARS="$ENV_VARS;;SPRING_RABBITMQ_SSL_ENABLED=true"
          fi

          # Cloud Run URL suffix — deterministic, all services share the same suffix
          # e.g. https://company-service-528350958894.us-east4.run.app
          CLOUD_RUN_URL_SUFFIX=$(gcloud secrets versions access latest --secret=cloud-run-url-suffix --project=$GCP_PROJECT_ID)
          ENV_VARS="$ENV_VARS;;CLOUD_RUN_URL_SUFFIX=${CLOUD_RUN_URL_SUFFIX}"
          echo "Cloud Run URL suffix: $CLOUD_RUN_URL_SUFFIX"

          # MongoDB
          if [ -n "${{ inputs.mongodb_database }}" ]; then
            MONGODB_URI_BASE=$(gcloud secrets versions access latest --secret=mongodb-uri-base --project=$GCP_PROJECT_ID)
            ENV_VARS="$ENV_VARS;;SPRING_DATA_MONGODB_URI=${MONGODB_URI_BASE}/${{ inputs.mongodb_database }}"
          fi

          # Storage
          if [ "${{ inputs.use_storage }}" = "true" ]; then
            STORAGE_BUCKET=$(gcloud secrets versions access latest --secret=storage-bucket --project=$GCP_PROJECT_ID)
            STORAGE_PUBLIC_URL=$(gcloud secrets versions access latest --secret=storage-public-url --project=$GCP_PROJECT_ID)
            ENV_VARS="$ENV_VARS;;AWS_S3_BUCKET=${STORAGE_BUCKET}"
            ENV_VARS="$ENV_VARS;;AWS_S3_PUBLIC_URL=${STORAGE_PUBLIC_URL}"
          fi

          # OpenTelemetry → Datadog Agent (only when agent URL is available)
          if [ -n "$DATADOG_AGENT_URL" ]; then
            ENV_VARS="$ENV_VARS;;OTEL_EXPORTER_OTLP_METRICS_ENDPOINT=${DATADOG_AGENT_URL}/v1/metrics"
            ENV_VARS="$ENV_VARS;;OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=${DATADOG_AGENT_URL}/v1/traces"
            ENV_VARS="$ENV_VARS;;OTEL_EXPORTER_OTLP_LOGS_ENDPOINT=${DATADOG_AGENT_URL}/v1/logs"
            # Spring Boot Micrometer reads its own property, not the OTEL standard env var
            ENV_VARS="$ENV_VARS;;MANAGEMENT_OTLP_METRICS_EXPORT_URL=${DATADOG_AGENT_URL}/v1/metrics"
          fi
          ENV_VARS="$ENV_VARS;;DD_ENV=$ENVIRONMENT"
          ENV_VARS="$ENV_VARS;;DD_SERVICE=${{ inputs.service_name }}"

          # Extra env vars
          if [ -n "${{ inputs.extra_env_vars }}" ]; then
            ENV_VARS="$ENV_VARS;;${{ inputs.extra_env_vars }}"
          fi

          # --- Build secrets for --set-secrets (native Secret Manager mount) ---
          SECRETS=""
          if [ -n "${{ inputs.database_name }}" ]; then
            SECRETS="SPRING_DATASOURCE_PASSWORD=${{ inputs.db_password_secret_name }}:latest"
          fi

          # Clerk secrets
          if [ "${{ inputs.use_clerk }}" = "true" ]; then
            [ -n "$SECRETS" ] && SECRETS="$SECRETS,"
            SECRETS="${SECRETS}CLERK_SECRET_KEY=clerk-secret-key:latest,CLERK_WEBHOOK_SIGNING_SECRET=clerk-webhook-signing-secret:latest"
          fi

          # Clerk JWT public key (api-gateway)
          if [ "${{ inputs.use_clerk_jwt }}" = "true" ]; then
            [ -n "$SECRETS" ] && SECRETS="$SECRETS,"
            SECRETS="${SECRETS}CLERK_JWT_PUBLIC_KEY=clerk-jwt-public-key:latest"
          fi

          SECRETS_FLAG=""
          if [ -n "$SECRETS" ]; then
            SECRETS_FLAG="--set-secrets=$SECRETS"
          fi

          # --- Get VPC Connector ---
          VPC_CONNECTOR=$(gcloud compute networks vpc-access connectors list \
            --region=${{ env.GCP_REGION }} \
            --project=$GCP_PROJECT_ID \
            --format='value(name)' \
            --limit=1)

          # --- Set min instances - all services with at least 1 instance ---
          MIN_INSTANCES=1

          # --- Deploy ---
          SA_NAME="${{ inputs.service_name }}-sa"
          SERVICE_ACCOUNT="${SA_NAME}@${GCP_PROJECT_ID}.iam.gserviceaccount.com"

          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image=$IMAGE_URI \
            --region=${{ env.GCP_REGION }} \
            --project=$GCP_PROJECT_ID \
            --platform=managed \
            --service-account=$SERVICE_ACCOUNT \
            --port=${{ inputs.expose_port }} \
            --cpu=${{ inputs.cpu }} \
            --memory=${{ inputs.memory }} \
            --ingress=${{ inputs.ingress }} \
            --vpc-connector=$VPC_CONNECTOR \
            --vpc-egress=all-traffic \
            --min-instances=$MIN_INSTANCES \
            --max-instances=10 \
            --timeout=300 \
            --cpu-boost \
            --startup-probe="tcpSocket.port=${{ inputs.expose_port }},initialDelaySeconds=0,timeoutSeconds=5,periodSeconds=5,failureThreshold=60" \
            --liveness-probe="httpGet.path=/actuator/health,httpGet.port=${{ inputs.expose_port }},initialDelaySeconds=0,timeoutSeconds=5,periodSeconds=30,failureThreshold=3" \
            --set-env-vars="^;;^$ENV_VARS" \
            $SECRETS_FLAG \
            --allow-unauthenticated \
            --quiet

      - name: Print deployment info
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "Deployment completed successfully!"
          echo "Service: ${{ inputs.service_name }}"
          echo "Version: ${{ env.VERSION }}"
          echo "URL: $SERVICE_URL"

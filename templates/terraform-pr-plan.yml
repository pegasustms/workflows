# Copiar para `terraform/.github/workflows/plan.yml`.
# Roda em PRs para detectar drift e mostrar mudanças antes do merge.

name: Terraform Plan

on:
  pull_request:
    branches: [main, develop]
    paths:
      - '**.tf'
      - '**.tfvars'
      - 'environments/**'
      - 'modules/**'
      - 'Makefile'

jobs:
  plan-dev:
    uses: pegasustms/workflows/.github/workflows/terraform-plan.yml@main
    with:
      environment_name: dev
      working_directory: '.'
      terraform_version: '1.10.0'
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VARS_TFVARS: ${{ secrets.TF_VARS_TFVARS }}

  # Plan prod só roda se PR é para main e tem label `infra:prod`
  plan-prod:
    if: github.base_ref == 'main' && contains(github.event.pull_request.labels.*.name, 'infra:prod')
    uses: pegasustms/workflows/.github/workflows/terraform-plan.yml@main
    with:
      environment_name: prod
      working_directory: '.'
      terraform_version: '1.10.0'
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VARS_TFVARS: ${{ secrets.TF_VARS_TFVARS_PROD }}
